spring:
  application:
    name: assignment

  datasource:
    url: jdbc:postgresql://localhost:5432/assignmentDb
    username: postgres
    password: 12345


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.example.backend.assignment: DEBUG
    org.springframework.data.redis: DEBUG